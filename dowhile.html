<!DOCTYPE html>
<html>
<body>

    <h2>Do...While Loop: 1 to 5</h2>

    <script>
        let i = 1;

        do {
            document.write("Number: " + i + "<br>");
            console.log("Current count: " + i);
            
            i++;
        } while (i <= 5);
    </script>

</body>
</html>
