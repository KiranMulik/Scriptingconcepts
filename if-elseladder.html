<!DOCTYPE html>
<html>
<body>

    <h2>Student Grade Checker</h2>

    <script>
        let marks = 85;

        if (marks >= 90) {
            document.write("Grade: A");
            console.log("Excellent work!");
        } 
        else if (marks >= 80) {
            document.write("Grade: B");
            console.log("Good job!");
        } 
        else if (marks >= 70) {
            document.write("Grade: C");
            console.log("Passed.");
        } 
        else {
            document.write("Grade: Fail");
            console.log("Keep trying!");
        }
    </script>

</body>
</html>
