<!DOCTYPE html>
<html lang="en">
<head>
  <title>Electricity Bill</title>
</head>
<body>

  <h2>Electricity Bill Calculator</h2>
  Units: <input type="number" id="units">
  <button onclick="calculateBill()">Calculate</button>
  <p id="result"></p>

  <script>
    function calculateBill() {
      let units = Number(document.getElementById("units").value);
      let bill = 0;

      if (units <= 100) {
        bill = units * 1.5;
      } else if (units <= 200) {
        bill = (100 * 1.5) + ((units - 100) * 2.5);
      } else if (units <= 300) {
        bill = (100 * 1.5) + (100 * 2.5) + ((units - 200) * 4);
      } else {
        bill = (100 * 1.5) + (100 * 2.5) + (100 * 4) + ((units - 300) * 5);
      }

      document.getElementById("result").innerText = "Total Bill: ₹" + bill;
    }
  </script>

</body>
</html>
