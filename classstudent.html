<!DOCTYPE html>
<html lang="en">
<head>
  <title>Student Class Example</title>
</head>
<body>

  <h2>Student Information</h2>
  <p id="output"></p>

  <script>
    class Student {
      constructor(name, age, course) {
        this.name = name;
        this.age = age;
        this.course = course;
      }

      getDetails() {
        return `Name: ${this.name}, Age: ${this.age}, Course: ${this.course}`;
      }
    }

    const student1 = new Student("Ram", 20, "Computer Science");
    const student2 = new Student("Sham", 22, "Mathematics");

    document.getElementById("output").innerHTML =
      student1.getDetails() + "<br>" + student2.getDetails();
  </script>

</body>
</html>
