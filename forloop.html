<!DOCTYPE html>
<html>
<body>

    <h2>Printing Numbers 1 to 5</h2>

    <script>
    
        for (let i = 1; i <= 5; i++) {
            
            document.write("Number: " + i + "<br>");
            console.log("Current Number: " + i);    
            
        }
    </script>

</body>
</html>
