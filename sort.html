<!DOCTYPE html>
<html>
<body>

    <h2>Sorting Numbers (Descending)</h2>

    <script>
        let a = 12;
        let b = 45;
        let c = 23;
        let first, second, third;

        if (a >= b && a >= c) {
            first = a;
            if (b >= c) {
                second = b;
                third = c;
            } else {
                second = c;
                third = b;
            }
        } 
        else if (b >= a && b >= c) {
            first = b;
            if (a >= c) {
                second = a;
                third = c;
            } else {
                second = c;
                third = a;
            }
        } 
        else {
            first = c;
            if (a >= b) {
                second = a;
                third = b;
            } else {
                second = b;
                third = a;
            }
        }
        document.write("Original: 12, 45, 23 <br>");
        document.write("<b>Descending Order: " + first + ", " + second + ", " + third + "</b>");
        console.log("Sorted List: ", first, second, third);
    </script>

</body>
</html>
