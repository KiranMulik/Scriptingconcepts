<!DOCTYPE html>
<html>
<body>

    <h2>While Loop: 1 to 5</h2>

    <script>
        let i = 1;

        while (i <= 5) {
            
            document.write("Counting: " + i + "<br>");
            console.log("Console count: " + i);
            
            i++; 
        }
    </script>

</body>
</html>
